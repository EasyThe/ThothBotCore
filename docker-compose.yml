services:
  thothbot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    restart: unless-stopped
    env_file: .env
    environment:
      - BOT_TOKEN
      - MONGODB_URL
      - SENTRY_DSN
      - METRICS_PORT=${METRICS_PORT:-9284}
    ports:
      - "${METRICS_PORT:-9284}:${METRICS_PORT:-9284}"
    depends_on:
      - mongo
    volumes:
      - ./config:/app/Config:rw
      - ./data:/app/Storage:rw

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: